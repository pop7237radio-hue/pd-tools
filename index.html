<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#2563eb">
  <title>腹膜透析 生活サポートツール</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: #eef6ff;
      color: #0f172a;
      font-size: 20px;
      line-height: 1.7;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 18px 44px;
    }
    .hero {
      background: linear-gradient(135deg, #1d4ed8, #38bdf8);
      color: white;
      border-radius: 22px;
      padding: 28px 22px;
      margin-bottom: 18px;
      box-shadow: 0 14px 30px rgba(37, 99, 235, 0.22);
    }
    h1 {
      font-size: 32px;
      line-height: 1.35;
      margin: 0 0 12px;
      letter-spacing: 0;
    }
    .hero p { margin: 0; font-weight: 700; }
    .card {
      background: white;
      border-radius: 20px;
      padding: 22px;
      margin: 16px 0;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
    }
    h2 {
      font-size: 26px;
      line-height: 1.4;
      margin: 0 0 10px;
      letter-spacing: 0;
    }
    p { margin: 0 0 14px; }
    .button {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      color: white;
      background: #2563eb;
      border-radius: 16px;
      padding: 18px 14px;
      font-size: 22px;
      font-weight: 800;
      margin-top: 16px;
    }
    .button.green { background: #059669; }
    .note {
      color: #475569;
      font-size: 18px;
      background: #f8fafc;
      border: 2px solid #dbeafe;
    }
    ul {
      padding-left: 1.1em;
      margin: 8px 0 0;
    }
    li { margin: 8px 0; }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>腹膜透析の記録と在庫管理を、少しラクにするツール</h1>
      <p>スマホでぽちぽち入力して、毎日の確認をしやすくします。</p>
    </section>

    <section class="card">
      <h2>PD-Helper（毎日の記録）</h2>
      <p>除水量、かぐやの結果、体重や血圧などをスマホに記録できます。</p>
      <a class="button" href="./pd-helper/">PD-Helperを開く</a>
    </section>

    <section class="card">
      <h2>在庫管理ツール</h2>
      <p>透析液や物品の残り数を入れると、次の訪問日や配送日まで足りそうか確認できます。</p>
      <a class="button green" href="./pd-inventory/">在庫管理ツールを開く</a>
    </section>

    <section class="card note">
      <h2>大事なこと</h2>
      <ul>
        <li>このツールは、記録と在庫確認を楽にするためのものです。</li>
        <li>体調や治療の判断は、主治医や看護師さんに相談してください。</li>
        <li>入力したデータは、このスマホやブラウザの中に保存されます。こちらに送信されません。</li>
      </ul>
    </section>
  </main>
</body>
</html>
